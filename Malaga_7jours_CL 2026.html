<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MLG 7J">
<title>Málaga — 7 Jours</title>
<style>
/* ── TOKENS ── */
:root{
  --navy:#16313f; --red:#9c3b2e; --gold:#c9973a; --gold2:#e8b84b;
  --sage:#5f9e6b; --blue:#2f7a96;
  --bg:#f6f0e4; --bg2:#ece3d2; --surface:#fff; --surface2:#f8f3ea;
  --border:#e3d9c8; --text:#2a2018; --text2:#5a4f42; --text3:#8a7d6c;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
.dark{
  --bg:#101f26; --bg2:#15242c; --surface:#192b34; --surface2:#1d3038;
  --border:#243a44; --text:#ece4d6; --text2:#9da8a5; --text3:#5a6864;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── HERO ── */
.hero{
  background:#15323e;
  padding:calc(14px + var(--sat)) 18px 26px;
  position:relative;overflow:hidden;
}
.hero-glow{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 90% 10%, rgba(201,151,58,.13) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 5%  90%, rgba(47,122,150,.18) 0%, transparent 55%);
}
.hero-flag{
  position:absolute;right:16px;top:calc(14px + var(--sat));
  font-size:40px;opacity:.1;pointer-events:none;line-height:1;
}
.hero-toprow{
  position:relative;z-index:2;
  display:-webkit-flex;display:flex;
  -webkit-justify-content:space-between;justify-content:space-between;
  -webkit-align-items:center;align-items:center;
  margin-bottom:10px;
}
.hero-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);font-weight:700;}
.hero-eyebrow-group{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:9px;-webkit-flex-wrap:wrap;flex-wrap:wrap;row-gap:3px;}
.hero-divider{color:var(--gold2);font-size:9px;font-weight:700;opacity:.6;}
.hero-edition{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);font-weight:700;}
.hero-copyright{color:var(--gold2);margin-left:5px;letter-spacing:3px;font-weight:700;}
.hero-btns{display:-webkit-flex;display:flex;gap:7px;}
.hbtn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.85);border-radius:18px;padding:5px 11px;
  font-size:11px;font-weight:700;
}
.hero-content{position:relative;z-index:1;}
.hero h1{
  font-size:clamp(28px,8vw,50px);color:#fff;
  line-height:1.05;font-weight:700;font-style:normal;
  letter-spacing:-.5px;
}
.hero h1 em{font-style:italic;color:var(--gold2);}
.hero-sub{margin-top:7px;font-size:12px;color:rgba(255,255,255,.5);line-height:1.6;max-width:290px;font-weight:300;}
.hero-pills{display:-webkit-flex;display:flex;gap:6px;margin-top:14px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.hpill{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.78);border-radius:18px;padding:4px 10px;
  font-size:10px;font-weight:700;
}
.hpill span{color:var(--gold2);}
#vpill{display:none;}

/* ── SEARCH ── */
.search-outer{
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:10px 14px;position:sticky;top:0;z-index:400;
}
.search-box{
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:11px;padding:8px 11px;
}
.search-box input{
  -webkit-flex:1;flex:1;border:none;background:transparent;
  font-size:14px;color:var(--text);outline:none;
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
}
.search-box input::placeholder{color:var(--text3);}
#sclear{display:none;font-size:13px;color:var(--text3);padding:2px 4px;}
#sres{
  display:none;position:absolute;left:0;right:0;top:100%;
  background:var(--surface);border:1px solid var(--border);
  border-radius:0 0 12px 12px;max-height:280px;overflow-y:auto;z-index:500;
}
.sri{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.sri:last-child{border-bottom:none;}
.sri-n{font-size:13px;font-weight:700;color:var(--text);}
.sri-c{font-size:11px;color:var(--text3);margin-top:1px;}
.sr-empty{padding:18px;font-size:13px;color:var(--text3);text-align:center;}

/* ── TAB BAR ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:#192b34;
  border-top:1px solid rgba(255,255,255,.1);
  padding-bottom:var(--sab);
  z-index:1000;
  display:-webkit-flex;display:flex;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
}
.tab-bar::-webkit-scrollbar{display:none;}
.ti{
  -webkit-flex:none;flex:none;width:66px;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  padding:7px 2px 5px;gap:2px;
  border:none;background:none;
  color:rgba(255,255,255,.3);min-height:50px;
}
.ti.on{color:var(--gold2);}
.ti-icon{font-size:20px;line-height:1;}
.ti-lbl{font-size:8px;letter-spacing:.3px;font-weight:700;text-transform:uppercase;white-space:nowrap;}

/* ── PAGES ── */
.ca{padding-bottom:calc(62px + var(--sab) + 10px);}
.pg{display:none;}
.pg.on{display:block;}

/* ── TOP NAV (days) ── */
.tnav{
  position:sticky;top:0;z-index:500;
  background:var(--red);
  display:-webkit-flex;display:flex;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:0 8px;
}
.tnav::-webkit-scrollbar{display:none;}
.tnav-btn{
  -webkit-flex:none;flex:none;padding:11px 12px;
  color:rgba(255,255,255,.55);font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;white-space:nowrap;
  border:none;background:none;
  border-bottom:2.5px solid transparent;min-height:44px;
}
.tnav-btn.on{color:#fff;border-bottom-color:rgba(255,255,255,.8);background:rgba(255,255,255,.08);}

/* ── SECTION HEAD ── */
.sh{padding:22px 14px 0;}
.sh-eye{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:4px;}
.sh-title{font-size:23px;font-weight:700;line-height:1.15;color:var(--text);}
.sh-sub{font-size:12.5px;color:var(--text2);line-height:1.6;margin-top:4px;}

/* ── DAY HERO ── */
.dh{
  margin:12px 12px 0;border-radius:13px;
  background:#15323e;
  color:#fff;padding:17px;position:relative;overflow:hidden;
}
.dh-glow{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 100% at 100% 50%,rgba(156,59,46,.20) 0%,transparent 60%);
}
.dh-inner{position:relative;z-index:1;}
.dh-row{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:9px;margin-bottom:5px;}
.dh-num{font-size:44px;line-height:1;font-weight:700;color:rgba(255,255,255,.1);letter-spacing:-2px;}
.dh-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);font-weight:700;}
.dh-title{font-size:17px;font-weight:700;line-height:1.2;}
.dh-zone{margin-top:3px;font-size:11px;color:rgba(255,255,255,.4);}
.dh-share{
  position:absolute;top:12px;right:12px;z-index:2;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.8);border-radius:18px;padding:4px 9px;
  font-size:10px;font-weight:700;
}

/* ── PROGRESS STRIP ── */
.pstrip{
  margin:9px 12px 0;background:var(--surface);
  border:1px solid var(--border);border-radius:11px;padding:10px 12px;
}
.prow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;}
.pdot{
  width:22px;height:22px;border-radius:50%;
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  font-size:8px;font-weight:700;-webkit-flex-shrink:0;flex-shrink:0;cursor:pointer;
}
.pdot.done{background:var(--sage);color:#fff;}
.pdot.cur{background:var(--red);color:#fff;}
.pdot.todo{background:var(--border);color:var(--text3);}
.pline{-webkit-flex:1;flex:1;height:2px;background:var(--border);border-radius:1px;}
.pline.done{background:var(--sage);}
.plbl{font-size:10px;color:var(--text3);margin-top:5px;}

/* ── STOPS ── */
.sl{padding:0 12px;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;}
.si{display:-webkit-flex;display:flex;gap:9px;position:relative;}
.si:not(:last-child)::before{
  content:'';position:absolute;left:17px;top:36px;bottom:-4px;
  width:2px;background:var(--border);
}
.sdw{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;padding-top:9px;-webkit-flex-shrink:0;flex-shrink:0;position:relative;z-index:1;}
.sdot{
  width:36px;height:36px;border-radius:50%;
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  font-size:15px;background:var(--surface);
  border:2px solid var(--bg);position:relative;
}
.sdot.vis::after{
  content:'✓';position:absolute;bottom:-1px;right:-2px;
  width:13px;height:13px;border-radius:50%;
  background:var(--sage);color:#fff;font-size:7px;font-weight:700;
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  border:1.5px solid var(--bg);
}
.sc{
  background:var(--surface);border-radius:13px;
  padding:12px;margin:7px 0;
  border:1px solid var(--border);-webkit-flex:1;flex:1;
}
.sc.vis{border-left:3px solid var(--sage);}
.sc-top{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:flex-start;align-items:flex-start;gap:6px;margin-bottom:5px;}
.stb{font-size:9.5px;background:#15323e;color:#fff;padding:2px 8px;border-radius:18px;font-weight:700;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0;}
.dark .stb{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);}
.bgs{display:-webkit-flex;display:flex;gap:3px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.bg{font-size:8px;padding:2px 6px;border-radius:7px;font-weight:700;text-transform:uppercase;}
.bf{background:#d4f0d4;color:#1a6b1a;}
.bl{background:#d4e8f0;color:#0a4a6b;}
.bm{background:#f0e8c8;color:#6b4a0a;}
.bu{background:#f0d4d4;color:#6b0a0a;}
.bh{background:#e8d4f0;color:#4a0a6b;}
.ba{background:#d4e0f0;color:#0a2a6b;}
.bs{background:#d4f0e0;color:#0a4a2a;}
.dark .bf{background:rgba(95,158,107,.2);color:#90d890;}
.dark .bl{background:rgba(47,122,150,.2);color:#80c8e0;}
.dark .bm{background:rgba(201,151,58,.2);color:var(--gold2);}
.dark .bu{background:rgba(156,59,46,.2);color:#f09080;}
.dark .bh{background:rgba(107,78,142,.2);color:#c080f0;}
.dark .ba{background:rgba(47,90,150,.2);color:#80a8f0;}
.dark .bs{background:rgba(47,150,100,.2);color:#80d8a8;}
.sn{font-size:14.5px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.2;}
.sd{font-size:12px;line-height:1.65;color:var(--text2);}
.stip{
  margin-top:8px;background:var(--surface2);
  border-left:3px solid var(--gold);
  padding:7px 9px;border-radius:0 8px 8px 0;
  font-size:11px;color:var(--text2);font-style:italic;line-height:1.5;
}
.sact{display:-webkit-flex;display:flex;gap:6px;margin-top:9px;-webkit-align-items:center;align-items:center;}
.smaps{
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:3px;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--blue);border-radius:8px;padding:5px 9px;
  font-size:11px;font-weight:700;
}
.sck{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text3);border-radius:8px;padding:5px 9px;
  font-size:11px;font-weight:700;margin-left:auto;
}
.sck.on{background:rgba(95,158,107,.15);border-color:var(--sage);color:var(--sage);}

/* ── MEALS ── */
.mc{margin:4px 12px 0;border-radius:13px;overflow:hidden;}
.mci{padding:12px 13px;display:-webkit-flex;display:flex;gap:10px;-webkit-align-items:flex-start;align-items:flex-start;}
.ml{background:#2d4a30;}
.md{background:#15323e;}
.mv{background:#5a2438;}
.ms{background:#8a5a1f;}
.mico{font-size:22px;-webkit-flex-shrink:0;flex-shrink:0;margin-top:1px;}
.mlbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.ml .mlbl{color:#90e890;} .md .mlbl{color:var(--gold2);}
.mname{font-size:13.5px;font-weight:700;color:#fff;margin-bottom:2px;line-height:1.2;}
.mdsc{font-size:11.5px;color:rgba(255,255,255,.68);line-height:1.55;}
.mft{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:7px;margin-top:7px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.mpr{font-size:10px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);padding:3px 8px;border-radius:18px;}
.mmaps{font-size:10px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);padding:3px 8px;border-radius:18px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:3px;}

/* ── OVERVIEW ── */
.og{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:9px;padding:13px;}
.oc{
  background:var(--surface);border-radius:13px;
  padding:12px;border-top:4px solid var(--border);
  width:calc(50% - 5px);position:relative;cursor:pointer;
}
.oc-ck{position:absolute;top:8px;right:8px;font-size:12px;color:var(--sage);display:none;}
.oc.full .oc-ck{display:block;}
.on1{border-top-color:var(--red);}
.on2{border-top-color:var(--gold);}
.on3{border-top-color:#6b5aaa;}
.on4{border-top-color:var(--sage);}
.on5{border-top-color:var(--blue);}
.on6{border-top-color:#2d8e7d;}
.on7{border-top-color:#c2703d;}
.onum{font-size:32px;font-weight:700;line-height:1;margin-bottom:3px;color:var(--border);}
.on1 .onum{color:rgba(156,59,46,.16);}
.on2 .onum{color:rgba(201,151,58,.18);}
.on3 .onum{color:rgba(107,90,170,.14);}
.on4 .onum{color:rgba(95,158,107,.18);}
.on5 .onum{color:rgba(47,122,150,.18);}
.on6 .onum{color:rgba(45,142,125,.16);}
.on7 .onum{color:rgba(194,112,61,.18);}
.otheme{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;}
.ostops{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.4;}
.oprog{margin-top:7px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.opf{height:100%;border-radius:2px;background:var(--sage);width:0;-webkit-transition:width .4s;transition:width .4s;}

/* ── LEGEND ── */
.lgd{margin:0 12px 12px;background:var(--surface);border-radius:13px;padding:12px;border:1px solid var(--border);}
.lgd-t{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:7px;}
.lgd-ps{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:5px;}

/* ── GASTRO ── */
.dscroll{display:-webkit-flex;display:flex;overflow-x:auto;gap:8px;padding:10px 12px;-webkit-overflow-scrolling:touch;}
.dscroll::-webkit-scrollbar{display:none;}
.dc{-webkit-flex:none;flex:none;width:115px;background:var(--surface);border-radius:13px;padding:11px 9px;border:1px solid var(--border);}
.dem{font-size:26px;margin-bottom:6px;display:block;}
.dn{font-size:11.5px;font-weight:700;margin-bottom:2px;color:var(--text);line-height:1.2;}
.dd{font-size:10px;color:var(--text2);line-height:1.4;}
.dp{font-size:9.5px;color:var(--blue);font-weight:700;margin-top:4px;}

.rl{padding:0 12px;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;}
.rc{background:var(--surface);border-radius:13px;overflow:hidden;border:1px solid var(--border);}
.rh{display:-webkit-flex;display:flex;}
.rbar{width:5px;-webkit-flex-shrink:0;flex-shrink:0;}
.rb{padding:11px 11px;-webkit-flex:1;flex:1;}
.rr1{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:flex-start;align-items:flex-start;gap:6px;}
.rname{font-size:13.5px;font-weight:700;color:var(--text);}
.rprice{font-size:10px;font-weight:700;background:var(--bg2);color:var(--text3);padding:2px 7px;border-radius:7px;white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0;}
.rzone{font-size:9px;color:var(--red);font-weight:700;letter-spacing:.5px;margin:2px 0 3px;}
.rstars{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;margin-bottom:4px;}
.stars{font-size:11px;color:var(--gold2);}
.rdesc{font-size:11.5px;color:var(--text2);line-height:1.55;}
.rtag{font-size:9.5px;margin-top:5px;font-weight:700;color:var(--text3);}
.tl{color:var(--sage);} .td{color:var(--navy);} .dark .td{color:var(--gold2);} .tb{color:#7a4e9e;}

/* ── BUDGET ── */
.bstats{display:-webkit-flex;display:flex;gap:7px;padding:12px;}
.bst{background:var(--surface);border-radius:13px;padding:12px 7px;text-align:center;border:1px solid var(--border);-webkit-flex:1;flex:1;}
.bstn{font-size:20px;font-weight:700;color:var(--text);}
.bstu{font-size:9px;color:var(--gold);font-weight:700;display:block;}
.bstl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-top:1px;}
.btw{padding:0 12px 12px;}
.bt{width:100%;border-collapse:collapse;background:var(--surface);border-radius:13px;overflow:hidden;border:1px solid var(--border);font-size:11.5px;}
.bt th{background:#15323e;color:rgba(255,255,255,.7);padding:9px 11px;text-align:left;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.dark .bt th{background:rgba(255,255,255,.06);}
.bt td{padding:9px 11px;border-bottom:1px solid var(--border);}
.bt tr:last-child td{border-bottom:none;}
.bt tr:nth-child(even) td{background:var(--surface2);}
.pf{color:var(--sage);font-weight:700;}
.pl{color:var(--blue);font-weight:700;}
.pm{color:var(--gold);font-weight:700;}
.ctip{margin:0 12px 10px;background:#15323e;color:#fff;border-radius:13px;padding:13px;}
.dark .ctip{background:var(--surface);}
.ctip-t{font-size:13.5px;font-weight:700;color:var(--gold2);margin-bottom:4px;}
.ctip-b{font-size:11.5px;line-height:1.65;color:rgba(255,255,255,.75);}
.dark .ctip-b{color:var(--text2);}

/* ── ALTERNATIVES ── */
.as{padding:12px 12px 0;}
.as-t{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;padding-bottom:7px;border-bottom:2px solid var(--border);}
.ait{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:6px;margin-bottom:16px;}
.ai{background:var(--surface);border-radius:10px;padding:10px 11px;border:1px solid var(--border);display:-webkit-flex;display:flex;gap:8px;-webkit-align-items:flex-start;align-items:flex-start;}
.aic{font-size:18px;-webkit-flex-shrink:0;flex-shrink:0;margin-top:1px;}
.ain{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px;}
.aid{font-size:11px;color:var(--text2);line-height:1.5;}
.ait-tag{display:inline-block;font-size:8px;font-weight:700;margin-top:3px;padding:2px 6px;border-radius:7px;}

/* ── WEATHER ── */
.sg{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:8px;padding:12px;}
.sk{background:var(--surface);border-radius:13px;padding:13px;border:1px solid var(--border);border-top:4px solid var(--border);width:calc(50% - 4px);}
.skie{font-size:26px;margin-bottom:5px;display:block;}
.skn{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1px;}
.skm{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:6px;}
.skt{display:inline-block;background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:2px 8px;font-size:11px;font-weight:700;margin-bottom:6px;}
.skl{list-style:none;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:3px;}
.skl li{font-size:10.5px;color:var(--text2);padding-left:11px;position:relative;line-height:1.4;}
.skl li::before{content:'·';position:absolute;left:0;color:var(--gold);font-weight:700;}
.wnote{margin:0 12px 10px;background:var(--surface);border-radius:13px;padding:13px;border:1px solid var(--border);}
.wnote h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text);}
.wtbl{width:100%;font-size:11.5px;border-collapse:collapse;}
.wtbl th{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:5px 0;border-bottom:1px solid var(--border);text-align:left;}
.wtbl td{padding:7px 0;border-bottom:1px solid var(--border);color:var(--text2);}
.wtbl tr:last-child td{border-bottom:none;}

/* ── TIPS ── */
.tg{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;padding:12px;}
.tk{background:var(--surface);border-radius:13px;padding:13px;border:1px solid var(--border);}
.tk h3{font-size:14.5px;font-weight:700;color:var(--text);margin-bottom:8px;}
.tk ul{list-style:none;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:5px;}
.tk li{font-size:12px;line-height:1.55;color:var(--text2);padding-left:12px;position:relative;}
.tk li::before{content:'–';position:absolute;left:0;color:var(--gold);font-weight:700;}

.salt-btn{background:var(--bg2);border:1px solid var(--gold);color:var(--gold);border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;}
.salt-btn.on{background:var(--gold);color:#fff;}
.mftbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:var(--gold2);}
.mftbtn.on{background:var(--gold);border-color:var(--gold);color:#fff;}
.salt{margin-top:9px;background:var(--surface2);border:1.5px dashed var(--gold);border-radius:9px;padding:9px 10px;}
.salt-lbl{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:3px;}
.salt-name{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:3px;}
.salt-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:7px;}
.saltmaps{display:inline-flex;}
.mci .salt{background:rgba(255,255,255,.08);border-color:var(--gold2);}
.mci .salt-name{color:#fff;}
.mci .salt-desc{color:rgba(255,255,255,.68);}
.mci .salt-lbl{color:var(--gold2);}

/* ── SHOPPING ── */
.shop-joke{border:2px dashed var(--gold);text-align:center;background:var(--surface2);}
.shop-joke p{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.shop-joke-btn{background:var(--red);color:#fff;border:none;border-radius:18px;padding:9px 18px;font-size:12.5px;font-weight:700;}

/* ── MODAL (easter egg) ── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,15,10,.65);display:none;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;z-index:3000;padding:24px;}
.modal-overlay.show{display:-webkit-flex;display:flex;}
.modal-card{background:var(--surface);border-radius:20px;padding:22px 20px 18px;max-width:340px;text-align:center;border:3px solid var(--gold);position:relative;-webkit-animation:popIn .35s ease;animation:popIn .35s ease;}
@-webkit-keyframes popIn{from{-webkit-transform:scale(.7) rotate(-4deg);opacity:0;}to{-webkit-transform:scale(1) rotate(0);opacity:1;}}
@keyframes popIn{from{transform:scale(.7) rotate(-4deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.modal-card svg{width:260px;height:auto;margin:0 auto 10px;display:block;}
.modal-title{font-size:14.5px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px;}
.modal-title strong{color:var(--red);}
.modal-close{background:#15323e;color:#fff;border:none;border-radius:18px;padding:8px 20px;font-size:12px;font-weight:700;margin-top:6px;}

/* ── UTILS ── */
.sp{height:12px;} .spsm{height:6px;}
.ft{text-align:center;padding:16px 12px;font-size:10px;color:var(--text3);}
.ft span{color:var(--gold);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(65px + var(--sab) + 10px);left:50%;
  -webkit-transform:translateX(-50%) translateY(16px);transform:translateX(-50%) translateY(16px);
  background:#15323e;color:#fff;border-radius:18px;padding:7px 16px;
  font-size:12.5px;font-weight:700;white-space:nowrap;
  opacity:0;pointer-events:none;z-index:2000;
  -webkit-transition:opacity .2s,-webkit-transform .2s;transition:opacity .2s,transform .2s;
}
.toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
</style>

    try{ window.eval(b64d(J)); }catch(e){}
  }
  function showLock(msg){

      '</div></div>';
    document.getElementById('pwBtn').onclick = tryUnlock;
    var inp = document.getElementById('pwInp');
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') tryUnlock(); });
    inp.focus();
  }
  function tryUnlock(){
    var v = document.getElementById('pwInp').value || '';
    if(v.trim().toUpperCase() === PW){
      try{ localStorage.setItem(UK,'1'); }catch(e){}
      boot();
    } else {
      showLock('Code incorrect \u2014 r\u00e9essayez.');
    }
  }
  var unlocked = true;
  try{
    if(Date.now() >= GATE){
      unlocked = localStorage.getItem(UK) === '1';
    }
  }catch(e){}
  if(unlocked){ boot(); } else { showLock(); }
